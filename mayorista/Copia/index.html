<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NovaCenter - Mayorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    #login-overlay {
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #login-overlay.oculto { display: none; }
    #login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 300px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,180,41,0.25);
      border-radius: 20px;
      padding: 32px 24px;
    }
    #login-box img {
      width: 180px;
      border-radius: 14px;
      border: 2px solid rgba(240,180,41,0.35);
      box-shadow: 0 0 24px rgba(240,180,41,0.15);
    }
    #login-titulo {
      color: #f0b429;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: -6px 0 0;
    }
    #login-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(240,180,41,0.3), transparent);
    }
    #login-fila {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    #login-pass {
      flex: 1;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid #444;
      background: #1a1a1a;
      color: white;
      font-size: 15px;
    }
    #login-pass:focus { border-color: #f0b429; outline: none; }
    #login-btn {
      padding: 11px 18px;
      background: #f0b429;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-btn:hover { background: #d4991f; }
    #login-error {
      color: #ff6347;
      font-size: 13px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-overlay">
    <div id="login-box">
      <img src="../../images/perfil.jpg" alt="NovaCenter">
      <p id="login-titulo">Acceso Mayorista</p>
      <div id="login-divider"></div>
      <div id="login-fila">
        <input type="password" id="login-pass" placeholder="Contraseña" />
        <button id="login-btn">Ingresar</button>
      </div>
      <span id="login-error">Contraseña incorrecta</span>
    </div>
  </div>

  <script>
    const CLAVES = {
      "nova2026":  "repuestos",   // solo modulos, baterias, repuestos, herramientas, placas
      "kiosko26":  "kiosko",      // todo excepto repuestos de celular
      "admin2026": "admin"        // todo completo
    };

    function verificarLogin() {
      if (sessionStorage.getItem("mayorista-perfil")) {
        document.getElementById("login-overlay").classList.add("oculto");
      }
    }

    function intentarLogin() {
      const input = document.getElementById("login-pass");
      const perfil = CLAVES[input.value.trim()];
      if (perfil) {
        sessionStorage.setItem("mayorista-perfil", perfil);
        location.reload();
      } else {
        document.getElementById("login-error").style.display = "block";
        input.value = "";
        input.focus();
      }
    }

    document.getElementById("login-btn").addEventListener("click", intentarLogin);
    document.getElementById("login-pass").addEventListener("keydown", e => {
      if (e.key === "Enter") intentarLogin();
    });

    verificarLogin();
  </script>

  <!-- Topbar móvil -->
  <div id="topbar-movil">
    <div class="topbar-izquierda">
      <button id="toggle-filtros" class="menu-toggle"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <h1>NovaCenter <span class="tag-mayorista">MAYORISTA</span></h1>
    <button id="toggle-menu" class="menu-toggle"><i class="fas fa-bars"></i></button>
  </div>

  <!-- Barra de búsqueda -->
  <section id="busqueda-filtros">
    <input type="text" id="input-buscar" placeholder="Buscar producto..." />
    <label><input type="checkbox" id="filtro-stock"> Solo en stock</label>
    <select id="ordenar-select">
      <option value="">Ordenar por Stock</option>
      <option value="precio-asc">Precio: Menor a Mayor</option>
      <option value="precio-desc">Precio: Mayor a Menor</option>
      <option value="nombre-asc">Nombre: A-Z</option>
      <option value="nombre-desc">Nombre: Z-A</option>
    </select>
  </section>

  <!-- Sidebar -->
  <aside id="sidebar">
    <h1>NovaCenter <span class="tag-mayorista">MAY</span></h1>
    <nav id="menu">
      <button id="ver-todos">🛒 Ver Todos</button>
      <div class="borde-extra"></div>
      <p class="label-filtros">Filtros por cliente</p>
      <ul id="menu-filtros"></ul>
      <div class="borde-extra"></div>
      <ul id="menu-categorias"></ul>
    </nav>
  </aside>

  <main id="contenedor-productos"></main>

  <script src="script.js"></script>
</body>
</html>
