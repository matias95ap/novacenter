<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaCenter - Mayorista</title>
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://connect.facebook.net">
  <script src="/analytics.js" defer></script>
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <!-- Login -->
  <div id="login-overlay">
    <div id="login-box">
      <a href="/"><img src="../../images/perfil.jpg" alt="NovaCenter"></a>
      <p id="login-titulo"><a href="/" style="text-decoration: none; color: inherit;">Acceso Mayorista</a></p>
      <div id="login-divider"></div>
      <div id="login-fila">
        <input type="password" id="login-pass" placeholder="Contraseña" />
        <button id="login-btn">Ingresar</button>
      </div>
      <span id="login-error">Contraseña incorrecta</span>
    </div>
  </div>

  <!-- Topbar móvil -->
  <div id="topbar-movil">
    <div class="topbar-izquierda">
      <button id="toggle-filtros" class="menu-toggle"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <h1><a href="/" style="text-decoration: none; color: inherit;">NovaCenter </a><span class="tag-mayorista">MAYORISTA</span></h1>
    <button id="toggle-menu" class="menu-toggle"><i class="fas fa-bars"></i></button>
  </div>

  <!-- Barra de búsqueda -->
  <section id="busqueda-filtros">
    <input type="text" id="input-buscar" placeholder="Buscar producto..." />
    <label><input type="checkbox" id="filtro-stock"> Solo en stock</label>
    <select id="ordenar-select">
      <option value="">Ordenar por Stock</option>
      <option value="precio-asc">Precio: Menor a Mayor</option>
      <option value="precio-desc">Precio: Mayor a Menor</option>
      <option value="nombre-asc">Nombre: A-Z</option>
      <option value="nombre-desc">Nombre: Z-A</option>
    </select>
  </section>

  <!-- Sidebar -->
  <aside id="sidebar" class="oculto">
    <h1><a href="/" style="text-decoration: none; color: inherit;">NovaCenter </a><span class="tag-mayorista">MAY</span></h1>
    <nav id="menu">
      <button id="ver-todos">🛒 Ver Todos</button>
      <div class="borde-extra"></div>
      <p class="label-filtros">Categorias</p>
      <ul id="menu-filtros"></ul>
      <div class="borde-extra"></div>
      <ul id="menu-categorias"></ul>
    </nav>
  </aside>

  <main id="contenedor-productos"></main>

  <!-- Login (debe ir antes que los demás) -->
  <script src="js/login.js"></script>

  <!-- Compartidos -->
  <script src="/shared/capitalizar.js"></script>
  <script src="/shared/imagenes.js"></script>
  <script src="/shared/busqueda.js"></script>
  <!-- Módulos propios -->
  <script src="js/config.js"></script>
  <script src="js/filtros.js"></script>
  <script src="js/render.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/router.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
