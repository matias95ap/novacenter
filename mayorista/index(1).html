<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NovaCenter - Mayorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    #login-overlay {
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #login-overlay.oculto { display: none; }
    #login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 300px;
    }
    #login-box img {
      width: 200px;
      margin-bottom: 10px;
    }
    #login-fila {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    #login-pass {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 2px solid #444;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }
    #login-pass:focus { border-color: #f0b429; outline: none; }
    #login-btn {
      padding: 10px 18px;
      background: #f0b429;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }
    #login-btn:hover { background: #d4991f; }
    #login-error {
      color: #ff6347;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-overlay">
    <div id="login-box">
      <img src="../tienda/img/logo.webp" onerror="this.style.display='none'">
      <div id="login-fila">
        <input type="password" id="login-pass" placeholder="Contraseña" />
        <button id="login-btn">Ingresar</button>
      </div>
      <span id="login-error">Contraseña incorrecta</span>
    </div>
  </div>

  <script>
    const CLAVE = "nova2025"; // cambia esta contraseña

    function verificarLogin() {
      if (sessionStorage.getItem("mayorista-auth") === "1") {
        document.getElementById("login-overlay").classList.add("oculto");
      }
    }

    function intentarLogin() {
      const input = document.getElementById("login-pass");
      if (input.value === CLAVE) {
        sessionStorage.setItem("mayorista-auth", "1");
        document.getElementById("login-overlay").classList.add("oculto");
      } else {
        document.getElementById("login-error").style.display = "block";
        input.value = "";
        input.focus();
      }
    }

    document.getElementById("login-btn").addEventListener("click", intentarLogin);
    document.getElementById("login-pass").addEventListener("keydown", e => {
      if (e.key === "Enter") intentarLogin();
    });

    verificarLogin();
  </script>

  <!-- Topbar móvil -->
  <div id="topbar-movil">
    <div class="topbar-izquierda">
      <button id="toggle-filtros" class="menu-toggle"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <h1>NovaCenter <span class="tag-mayorista">MAYORISTA</span></h1>
    <button id="toggle-menu" class="menu-toggle"><i class="fas fa-bars"></i></button>
  </div>

  <!-- Barra de búsqueda -->
  <section id="busqueda-filtros">
    <input type="text" id="input-buscar" placeholder="Buscar producto..." />
    <label><input type="checkbox" id="filtro-stock"> Solo en stock</label>
    <select id="ordenar-select">
      <option value="">Ordenar por Stock</option>
      <option value="precio-asc">Precio: Menor a Mayor</option>
      <option value="precio-desc">Precio: Mayor a Menor</option>
      <option value="nombre-asc">Nombre: A-Z</option>
      <option value="nombre-desc">Nombre: Z-A</option>
    </select>
  </section>

  <!-- Sidebar -->
  <aside id="sidebar">
    <h1>NovaCenter <span class="tag-mayorista">MAY</span></h1>
    <nav id="menu">
      <button id="ver-todos">🛒 Ver Todos</button>
      <div class="borde-extra"></div>
      <p class="label-filtros">Filtros por cliente</p>
      <ul id="menu-filtros"></ul>
      <div class="borde-extra"></div>
      <ul id="menu-categorias"></ul>
    </nav>
  </aside>

  <main id="contenedor-productos"></main>

  <script src="script.js"></script>
</body>
</html>
