<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaCenter</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="shortcut icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://connect.facebook.net">
  <script src="/analytics.js" defer></script>
  <meta property="og:title" content="NovaCenter - Tienda">
  <meta property="og:description" content="Consultá precios y stock en nuestra tienda online">
  <meta property="og:image" content="https://novacenter.ar/images/perfil.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://novacenter.ar/tienda/">
  <meta property="og:type" content="website">
  <!-- CSS compartido -->
  <link rel="stylesheet" href="/shared/css/base.css">
  <link rel="stylesheet" href="/shared/css/sidebar.css">
  <link rel="stylesheet" href="/shared/css/topbar.css">
  <link rel="stylesheet" href="/shared/css/responsive.css">
  <!-- CSS propio -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div id="topbar-movil">
    <div class="topbar-izquierda">
      <button id="toggle-filtros" class="menu-toggle"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <h1><a href="/" style="text-decoration: none; color: inherit;">NovaCenter</a></h1>
    <button id="toggle-menu" class="menu-toggle"><i class="fas fa-bars"></i></button>
  </div>
  <section id="busqueda-filtros">
    <input type="text" id="input-buscar" placeholder="Buscar producto..." />
    <label><input type="checkbox" id="filtro-stock"> Solo en stock</label>
    <select id="ordenar-select">
      <option value="">Ordenar por Stock</option>
      <option value="precio-asc">Precio: Menor a Mayor</option>
      <option value="precio-desc">Precio: Mayor a Menor</option>
      <option value="nombre-asc">Nombre: A-Z</option>
      <option value="nombre-desc">Nombre: Z-A</option>
    </select>
  </section>
  <aside id="sidebar">
    <h1><a href="/" style="text-decoration: none; color: inherit;">NovaCenter</a></h1>
    <nav id="menu">
      <button id="ver-todos">🛒 Ver Todos</button>
      <button id="ver-nuevos">🆕 Nuevos Ingresos</button>
      <button id="ver-liquidacion">💸 Liquidación</button>
      <button id="ver-dia-nino">🎁 Novedades para Regalar</button>
      <div class="borde-extra"></div>
      <ul id="menu-categorias"></ul>
    </nav>
  </aside>
  <main id="contenedor-productos"></main>

  <!-- Compartidos globales (primero siempre) -->
  <script src="/shared/config-global.js"></script>
  <script src="/shared/excluidos.js"></script>
  <script src="/shared/capitalizar.js"></script>
  <script src="/shared/imagenes.js"></script>
  <script src="/shared/busqueda.js"></script>
  <script src="/shared/arrancar.js"></script>
  <!-- Módulos propios -->
  <script src="js/config.js"></script>
  <script src="js/filtros.js"></script>
  <script src="js/render.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/router.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
